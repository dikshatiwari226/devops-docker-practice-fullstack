version: "3.8"

services:
  backend:
    build: ./backend
    container_name: backend-container
    ports:
      - "8000:8000"
    env_file:
      - ".env"
    #environment:
     # - DEBUG=False         
    networks:
      - app-network

  frontend:
    build: ./frontend
    container_name: frontend-container
    ports:
      - "5173:80" 
    env_file:
      - ".env"
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
